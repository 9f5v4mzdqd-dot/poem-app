<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>詩をつくろう</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Shippori+Mincho:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Serif JP', serif;
  min-height: 100vh;
  background: #1a1a2e;
}

/* 🌙 修正ポイント① /
.sky-section {
  overflow: visible;
  background: linear-gradient(
    to bottom,
    #1c2a4a 0%, #2d3f6b 20%, #4a5a8a 38%,
    #7a7aaa 50%, #c0907a 65%, #e8b070 75%,
    #f0c878 82%, #e8d0a0 90%, #f5e8c8 100%
  );
  padding-bottom: 40px;
}

/ header /
header {
  text-align: center;
  padding: 50px 20px 20px;
}
.title-jp {
  font-family: 'Shippori Mincho', serif;
  font-size: 1.8rem;
  color: white;
  letter-spacing: 0.2em;
}

/ content /
.sky-content {
  padding: 0 18px;
}

.section-label-sky {
  color: rgba(255,255,255,0.8);
  font-size: 0.7rem;
  margin-bottom: 8px;
}

/ cards /
.cards-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.word-card {
  padding: 8px 14px;
  background: white;
  border-radius: 8px;
  cursor: pointer;
}

.word-card.selected {
  background: #4a6a9a;
  color: white;
}

/ 🌙 修正ポイント② /
.gen-wrap {
  position: sticky;
  bottom: 10px;
  padding: 20px 18px;
  background: linear-gradient(
    to top,
    rgba(26,26,46,0.9),
    rgba(26,26,46,0)
  );
  z-index: 10;
}

.gen-btn {
  width: 100%;
  padding: 14px;
  border-radius: 30px;
  border: none;
  background: #5a8a7a;
  color: white;
  font-size: 1rem;
  letter-spacing: 0.2em;
}

/ preview /
.preview-panel {
  background: #f7f4f0;
  padding-bottom: 10px;
}

.poem-display {
  padding: 20px;
  text-align: center;
}

.poem-line {
  font-family: 'Shippori Mincho', serif;
  font-size: 1.3rem;
  margin-bottom: 6px;
}

/ control */
.control-bar {
  display: flex;
  border-top: 1px solid #ddd;
}

.control-btn {
  flex: 1;
  padding: 12px;
  border: none;
  background: #eee;
}

</style>
</head>

<body>

<div class="sky-section">

  <header>
    <div class="title-jp">詩をつくろう</div>
  </header>

  <div class="sky-content">

    <div class="section-label-sky">ことばを選んで</div>

    <div class="cards-row">
      <div class="word-card" onclick="selectWord(this)">月</div>
      <div class="word-card" onclick="selectWord(this)">影</div>
      <div class="word-card" onclick="selectWord(this)">風</div>
      <div class="word-card" onclick="selectWord(this)">光</div>
    </div>

    <div class="gen-wrap">
      <button class="gen-btn" onclick="generatePoem()">詩に追加する</button>
    </div>

  </div>
</div>

<div class="preview-panel">

  <div class="poem-display" id="poemDisplay">
    ことばを選んでください
  </div>

  <div class="control-bar">
    <button class="control-btn" onclick="undoLine()">戻す</button>
    <button class="control-btn" onclick="resetPoem()">リセット</button>
  </div>

</div>

<script>

let poemStack = [];

function selectWord(el) {
  document.querySelectorAll('.word-card').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
}

function generatePoem() {
  const selected = document.querySelector('.word-card.selected');
  if (!selected) return;

  poemStack.push(selected.textContent);
  renderPoem();
}

function renderPoem() {
  const display = document.getElementById('poemDisplay');
  display.innerHTML = '';

  poemStack.forEach(line => {
    const div = document.createElement('div');
    div.className = 'poem-line';
    div.textContent = line;
    display.appendChild(div);
  });
}

function undoLine() {
  poemStack.pop();
  renderPoem();
}

function resetPoem() {
  poemStack = [];
  renderPoem();
}

</script>

</body>
</html>
